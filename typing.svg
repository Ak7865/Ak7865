<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: monospace;
      font-size: 20px;
      fill: #00F7FF;
      white-space: pre;
    }
  </style>

  <rect width="100%" height="100%" fill="black"/>

  <text x="20" y="40" class="text">
    <tspan>
      <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
      🎓 B.Tech CSE Student at Barak Valley Engineering College
    </tspan>

    <tspan x="20" dy="30">
      <animate attributeName="opacity" values="0;1" begin="1s" dur="1s" fill="freeze"/>
      💻 Full Stack Developer (React, Next.js, Flutter)
    </tspan>

    <tspan x="20" dy="30">
      <animate attributeName="opacity" values="0;1" begin="2s" dur="1s" fill="freeze"/>
      🚀 Founder of 8bitbannar – Web Development Company
    </tspan>

    <tspan x="20" dy="30">
      <animate attributeName="opacity" values="0;1" begin="3s" dur="1s" fill="freeze"/>
